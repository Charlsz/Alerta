# ponytail: weekly scheduled pipeline — no streaming/real-time infra needed yet.
# Switch to server cron + webhook when data freshness demands sub-daily updates.
name: pipeline
on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:
jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt
      - run: make pipeline
      - uses: actions/upload-artifact@v4
        with:
          name: alerta-duckdb
          path: data/alerta.duckdb
