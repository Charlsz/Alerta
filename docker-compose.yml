# docker-compose.yml — Alerta
# Levanta el backend (FastAPI) y el frontend (Next.js) con un solo comando:
#   make up
#
# Los datos se persisten en ./data/ en tu máquina local.
# El pipeline de ingesta se corre con:
#   docker compose run --rm backend python scripts/run_ingestion.py

services:

  # ── Backend: FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alerta-backend
    ports:
      - "8000:8000"
    volumes:
      # Monta el código fuente para hot-reload en desarrollo
      - .:/app
      # Persiste los datos en la máquina local (no dentro del contenedor)
      - ./data:/app/data
    env_file:
      - .env
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # ── Frontend: Next.js ────────────────────────────────────────────────────────
  frontend:
    build:
      context: src/web
      dockerfile: Dockerfile
    container_name: alerta-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./src/web:/app
      - /app/node_modules  # Excluir node_modules del volumen montado
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

# ── Redes ─────────────────────────────────────────────────────────────────────
# Docker Compose crea una red default automáticamente.
# Los servicios se comunican por nombre (ej: http://backend:8000).
